<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Método Paco v0.7</title>

<style>
body {
    font-family: Arial, sans-serif;
    background:#111;
    color:white;
    padding:20px;
}

.oculto {
    display:none;
}

.activo {
    border:1px solid #555;
    padding:15px;
    margin:10px 0;
    border-radius:10px;
}

input, button {
    padding:10px;
    margin:5px;
}

button {
    cursor:pointer;
}
</style>

</head>

<body>

<!-- INICIO -->
<div id="inicio" class="pantalla">

<h1>Método Paco v0.7</h1>

<button onclick="mostrar('cartera')">
Ver cartera
</button>

</div>


<!-- CARTERA -->
<div id="cartera" class="pantalla oculto">

<h2>Mi cartera</h2>


<input id="nombre" placeholder="Nombre activo">

<input id="ticker" placeholder="Ticker">

<input id="precio" type="number" placeholder="Precio compra">

<input id="actual" type="number" placeholder="Precio actual">

<input id="cantidad" type="number" placeholder="Cantidad">


<button onclick="guardarActivo()">
Guardar activo
</button>


<div id="lista"></div>


<h3>Resumen</h3>

<p>
Activos:
<span id="numActivos">0</span>
</p>

<p>
Invertido:
<span id="totalInvertido">0 €</span>
</p>

<p>
Valor actual:
<span id="valorActual">0 €</span>
</p>

<p>
Rentabilidad:
<span id="rentabilidad">0 €</span>
</p>


<button onclick="volver()">
Volver
</button>


</div>


<script src="script.js"></script>

</body>
</html>

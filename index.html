<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Método Paco v0.7</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div id="inicio" class="pantalla">

    <h1>MÉTODO PACO</h1>

    <p>Gestión sencilla de cartera</p>

    <button onclick="mostrar('cartera')">
        📈 Mi cartera
    </button>

</div>

<div id="cartera" class="pantalla oculto">

    <h2>Mi cartera</h2>

    <div class="formulario">

        <input
            type="text"
            id="nombre"
            placeholder="Nombre del activo">

        <input
            type="text"
            id="ticker"
            placeholder="Ticker">

        <input
            type="number"
            id="precio"
            step="0.01"
            placeholder="Precio compra">

        <input
            type="number"
            id="actual"
            step="0.01"
            placeholder="Precio actual">

        <input
            type="number"
            id="cantidad"
            step="0.000001"
            placeholder="Cantidad">

        <button onclick="guardarActivo()">
            💾 Guardar activo
        </button>

    </div>

    <hr>

    <h3>Resumen</h3>

    <p><strong>Activos:</strong> <span id="numActivos">0</span></p>

    <p><strong>Total invertido:</strong> <span id="totalInvertido">0 €</span></p>

    <p><strong>Valor actual:</strong> <span id="valorActual">0 €</span></p>

    <p><strong>Rentabilidad:</strong> <span id="rentabilidad">0 €</span></p>

    <hr>

    <div id="lista"></div>

    <button onclick="volver()">
        ⬅ Volver
    </button>

</div>

<script src="script.js"></script>

</body>

</html>
